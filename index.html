<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thi Trực Tuyến</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "Inter", sans-serif;
      background: linear-gradient(135deg, #93c5fd, #c084fc);
      min-height: 100vh;
    }
    .option-button {
      transition: all 0.3s ease;
    }
    .option-button:hover:not(.selected):not(.correct):not(.incorrect) {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    .option-button.selected {
      border: 3px solid #3b82f6;
      background-color: #eff6ff;
    }
    .option-button.correct {
      background-color: #10b981;
      color: white;
      border: 3px solid #059669;
    }
    .option-button.incorrect {
      background-color: #ef4444;
      color: white;
      border: 3px solid #dc2626;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <div id="quiz-container" class="w-full max-w-lg bg-white shadow-2xl rounded-2xl p-6 md:p-10 border border-gray-100">

    <!-- Header -->
    <div id="status-header" class="flex justify-between items-center mb-6 border-b pb-4 hidden">
      <div id="question-count" class="text-lg font-semibold text-indigo-600">Câu hỏi: 1/5</div>
      <div class="flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24"
          stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span id="timer" class="text-lg font-bold text-red-600">00:60</span>
      </div>
    </div>

    <!-- Màn hình chọn môn -->
    <div id="subject-screen" class="text-center">
      <h1 class="text-3xl font-extrabold text-gray-800 mb-4">Chọn Môn Thi</h1>
      <p class="text-gray-500 mb-6">Hãy chọn một môn để bắt đầu bài kiểm tra của bạn</p>
      <div class="grid grid-cols-2 gap-4">
        <button onclick="selectSubject('toan')" class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-3 rounded-lg shadow-md transition transform hover:scale-[1.02]">Toán</button>
        <button onclick="selectSubject('ly')" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 rounded-lg shadow-md transition transform hover:scale-[1.02]">Lý</button>
        <button onclick="selectSubject('van')" class="bg-pink-500 hover:bg-pink-600 text-white font-semibold py-3 rounded-lg shadow-md transition transform hover:scale-[1.02]">Văn</button>
        <button onclick="selectSubject('tin')" class="bg-green-500 hover:bg-green-600 text-white font-semibold py-3 rounded-lg shadow-md transition transform hover:scale-[1.02]">Tin Học</button>
      </div>
    </div>

    <!-- Màn hình bắt đầu thi -->
    <div id="start-screen" class="text-center hidden">
      <h1 class="text-3xl font-extrabold text-gray-800 mb-4" id="subject-title"></h1>
      <p class="text-gray-500 mb-8">Bạn có 60 giây cho mỗi câu hỏi. Chúc bạn làm bài tốt!</p>
      <button onclick="startQuiz()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg shadow-md transform hover:scale-[1.02]">
        BẮT ĐẦU THI
      </button>
    </div>

    <!-- Nội dung bài thi -->
    <div id="quiz-content" class="hidden">
      <h2 id="question-text" class="text-xl font-bold text-gray-800 mb-6 min-h-[50px]"></h2>
      <div id="options-container" class="space-y-4"></div>
      <div class="mt-8 flex justify-end space-x-4">
        <button id="next-button" onclick="nextQuestion()" disabled
          class="bg-gray-300 text-gray-700 font-semibold py-3 px-6 rounded-lg">Câu Tiếp Theo</button>
      </div>
    </div>

    <!-- Kết quả -->
    <div id="result-screen" class="hidden text-center p-6">
      <h2 class="text-3xl font-bold text-gray-800 mb-4">KẾT QUẢ CỦA BẠN</h2>
      <p id="final-score" class="text-5xl font-extrabold text-green-600 mb-6"></p>
      <p id="score-message" class="text-xl text-gray-600 mb-8"></p>
      <button onclick="resetQuiz()"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition transform hover:scale-[1.02]">Về
        Trang Môn Thi</button>
    </div>

    <!-- Hộp thông báo -->
    <div id="notification-box"
      class="fixed inset-0 bg-gray-600 bg-opacity-75 hidden items-center justify-center p-4 z-50">
      <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full text-center">
        <p id="notification-message" class="text-lg font-medium text-gray-800 mb-4">Thời gian đã hết!</p>
        <button onclick="closeNotification()"
          class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg">Đóng</button>
      </div>
    </div>

  </div>

  <script>
    const subjects = {
      toan: [
        { question: "Giá trị của 2 + 2 là?", options: ["3", "4", "5", "6"], answer: "4" },
        { question: "Căn bậc hai của 49 là?", options: ["6", "7", "8", "9"], answer: "7" },
        { question: "Tích của 5 và 6 là?", options: ["11", "30", "56", "15"], answer: "30" },
      ],
      ly: [
        { question: "Đơn vị của điện trở là gì?", options: ["Vôn", "Ampe", "Ôm", "Jun"], answer: "Ôm" },
        { question: "Tốc độ ánh sáng là khoảng bao nhiêu?", options: ["3x10^8 m/s", "3x10^6 m/s", "3x10^5 m/s", "3x10^7 m/s"], answer: "3x10^8 m/s" },
        { question: "Công thức tính công cơ học là?", options: ["A = F/s", "A = F * s", "A = F + s", "A = F / s"], answer: "A = F * s" },
      ],
      van: [
        { question: "Tác giả của 'Truyện Kiều' là ai?", options: ["Nguyễn Du", "Nguyễn Trãi", "Hồ Xuân Hương", "Tố Hữu"], answer: "Nguyễn Du" },
        { question: "Thể thơ 'Lục bát' có đặc điểm gì?", options: ["6-6", "8-8", "6-8", "4-6"], answer: "6-8" },
        { question: "‘Nam quốc sơn hà’ được coi là bài gì?", options: ["Thơ trữ tình", "Thơ chiến đấu", "Bản tuyên ngôn độc lập", "Hịch tướng sĩ"], answer: "Bản tuyên ngôn độc lập" },
      ],
      tin: [
        { question: "HTML là viết tắt của?", options: ["Hyper Text Markup Language", "Home Tool Markup Language", "Hyperlinks Markup Language", "High Tech Modern Language"], answer: "Hyper Text Markup Language" },
        { question: "CSS dùng để?", options: ["Lưu trữ dữ liệu", "Tạo kiểu giao diện web", "Kết nối cơ sở dữ liệu", "Tạo bảng tính"], answer: "Tạo kiểu giao diện web" },
        { question: "Từ khóa khai báo hằng trong JavaScript là?", options: ["let", "const", "var", "static"], answer: "const" },
      ]
    };

    let selectedSubject = null;
    let quizData = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let timerInterval;
    const TIME_LIMIT = 60;
    let timeLeft = TIME_LIMIT;

    const subjectScreen = document.getElementById("subject-screen");
    const startScreen = document.getElementById("start-screen");
    const quizContent = document.getElementById("quiz-content");
    const resultScreen = document.getElementById("result-screen");
    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const questionCount = document.getElementById("question-count");
    const timerDisplay = document.getElementById("timer");
    const nextButton = document.getElementById("next-button");
    const finalScoreDisplay = document.getElementById("final-score");
    const scoreMessage = document.getElementById("score-message");
    const statusHeader = document.getElementById("status-header");
    const notificationBox = document.getElementById("notification-box");
    const notificationMessage = document.getElementById("notification-message");

    function selectSubject(subject) {
      selectedSubject = subject;
      quizData = subjects[subject];
      subjectScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
      document.getElementById("subject-title").textContent =
        "Bài Thi Môn " + subject.charAt(0).toUpperCase() + subject.slice(1);
    }

    function startQuiz() {
      startScreen.classList.add("hidden");
      quizContent.classList.remove("hidden");
      statusHeader.classList.remove("hidden");
      score = 0;
      currentQuestionIndex = 0;
      displayQuestion();
    }

    function startTimer() {
      clearInterval(timerInterval);
      timeLeft = TIME_LIMIT;
      timerDisplay.textContent = `00:${timeLeft.toString().padStart(2, "0")}`;
      timerInterval = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `00:${timeLeft.toString().padStart(2, "0")}`;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          handleTimeout();
        }
      }, 1000);
    }

    function handleTimeout() {
      showNotification("Hết giờ cho câu hỏi này!");
      setTimeout(() => {
        nextQuestion();
      }, 1500);
    }

    function displayQuestion() {
      if (currentQuestionIndex >= quizData.length) return showResults();
      const q = quizData[currentQuestionIndex];
      questionCount.textContent = `Câu hỏi: ${currentQuestionIndex + 1}/${quizData.length}`;
      questionText.textContent = q.question;
      optionsContainer.innerHTML = "";
      nextButton.disabled = true;
      startTimer();
      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.textContent = opt;
        btn.className = "option-button w-full text-left bg-gray-50 text-gray-700 p-4 rounded-lg border border-gray-200 font-medium";
        btn.onclick = () => selectAnswer(btn, opt);
        optionsContainer.appendChild(btn);
      });
    }

    function selectAnswer(btn, ans) {
      clearInterval(timerInterval);
      const q = quizData[currentQuestionIndex];
      document.querySelectorAll(".option-button").forEach(b => (b.disabled = true));
      if (ans === q.answer) {
        btn.classList.add("correct");
        score++;
      } else {
        btn.classList.add("incorrect");
        document.querySelectorAll(".option-button").forEach(b => {
          if (b.textContent === q.answer) b.classList.add("correct");
        });
      }
      nextButton.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      displayQuestion();
    }

    function showResults() {
      clearInterval(timerInterval);
      quizContent.classList.add("hidden");
      statusHeader.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      finalScoreDisplay.textContent = `${score}/${quizData.length}`;
      const pct = (score / quizData.length) * 100;
      if (pct === 100)
        scoreMessage.textContent = "Xuất sắc! Bạn đạt điểm tuyệt đối!";
      else if (pct >= 60)
        scoreMessage.textContent = "Tốt lắm! Bạn có kiến thức khá vững.";
      else scoreMessage.textContent = "Hãy cố gắng ôn tập thêm nhé!";
    }

    function resetQuiz() {
      resultScreen.classList.add("hidden");
      subjectScreen.classList.remove("hidden");
    }

    function showNotification(msg) {
      notificationMessage.textContent = msg;
      notificationBox.classList.remove("hidden");
      notificationBox.classList.add("flex");
    }

    function closeNotification() {
      notificationBox.classList.add("hidden");
      notificationBox.classList.remove("flex");
    }
  </script>
</body>
</html>
